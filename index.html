<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOOT AI // CORE</title>
    <style>
        :root { --accent: #00f2ff; --glass: rgba(255, 255, 255, 0.05); --border: rgba(0, 242, 255, 0.2); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #05070a; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* METALLIC CIRCUITRY BACKGROUND */
        .bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at 20% 20%, rgba(0, 242, 255, 0.05) 0%, transparent 40%),
                        radial-gradient(circle at 80% 80%, rgba(147, 51, 234, 0.05) 0%, transparent 40%);
            background-color: #05070a; }
        .grid-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 40px 40px; opacity: 0.2; }

        /* FIXED HAMBURGER & NAV */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; 
              backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; background: rgba(5,7,10,0.8); }
        .logo { font-weight: 900; color: var(--accent); letter-spacing: 2px; }
        .menu-btn { font-size: 28px; cursor: pointer; color: var(--accent); background: none; border: none; }
        
        .nav-links { position: fixed; top: 0; right: -100%; width: 100%; max-width: 300px; height: 100vh; 
                     background: rgba(10, 15, 20, 0.98); backdrop-filter: blur(30px); border-left: 1px solid var(--border); 
                     padding: 80px 40px; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 2000; }
        .nav-links.active { right: 0; box-shadow: -20px 0 50px rgba(0,0,0,0.8); }
        .nav-links a { display: block; color: #fff; text-decoration: none; font-size: 1.1rem; margin-bottom: 25px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .nav-links a:hover { color: var(--accent); padding-left: 10px; }

        .container { width: 90%; max-width: 1200px; margin: 0 auto; padding: 60px 0; }
        header { text-align: center; margin-bottom: 80px; }
        h1 { font-size: clamp(2.5rem, 10vw, 5rem); font-weight: 900; letter-spacing: -2px; text-transform: uppercase; }

        /* LIQUID GLASS BUTTONS */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        .card { position: relative; background: var(--glass); border: 1px solid var(--border); 
                backdrop-filter: blur(20px) saturate(150%); padding: 60px 40px; border-radius: 2px; 
                text-decoration: none; color: #fff; transition: 0.4s; overflow: hidden; }
        .card::before { content: ""; position: absolute; top: -100%; left: -100%; width: 300%; height: 300%; 
                         background: linear-gradient(120deg, transparent, rgba(0, 242, 255, 0.1), transparent); 
                         transform: rotate(45deg); transition: 0.8s; pointer-events: none; }
        .card:hover { transform: translateY(-10px); border-color: var(--accent); background: rgba(0, 242, 255, 0.05); }
        .card:hover::before { top: 100%; left: 100%; }
        .card h3 { font-size: 1.5rem; letter-spacing: 3px; margin-bottom: 10px; text-transform: uppercase; color: var(--accent); }
        .card p { opacity: 0.6; font-size: 0.9rem; line-height: 1.6; }

        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="bg-layer"></div>
    <div class="grid-overlay"></div>
    <nav>
        <div class="logo">BOOT AI</div>
        <button class="menu-btn" onclick="toggle()">☰</button>
        <div class="nav-links" id="menuSide">
            <a href="#" onclick="toggle()" style="font-size: 35px; color: var(--accent); margin-bottom: 50px;">×</a>
            <a href="index.html">Home</a>
            <a href="products.html">Products</a>
            <a href="manifest.html">Manifest</a>
            <a href="gallery.html">Gallery</a>
            <a href="beta.html">Beta Hub</a>
            <a href="socials.html">Socials</a>
        </div>
    </nav>

    <div class="container">
        <header><h1>CORE INTERFACE</h1></header>
        <div class="grid">
            <a href="products.html" class="card"><h3>Products</h3><p>Active software deployments and tools.</p></a>
            <a href="manifest.html" class="card"><h3>Manifest</h3><p>System logs, version history, and blueprints.</p></a>
            <a href="gallery.html" class="card"><h3>Gallery</h3><p>Visual interface archive and screenshots.</p></a>
        </div>
    </div>

    <script>
        function toggle() { document.getElementById('menuSide').classList.toggle('active'); }
    </script>
</body>
</html>
