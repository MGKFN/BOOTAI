<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOOT AI | MGKFN</title>
    <style>
        :root { --bg: #ffffff; --text: #000; --accent: #eee; --card: #fafafa; }
        [data-theme="dark"] { --bg: #0a0a0a; --text: #fff; --accent: #1a1a1a; --card: #111; }
        * { -webkit-font-smoothing: antialiased; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); margin: 0; font-family: -apple-system, sans-serif; transition: background 0.4s cubic-bezier(0.16, 1, 0.3, 1); overflow-x: hidden; scroll-behavior: smooth; }
        nav { width: 100%; padding: 30px 50px; display: flex; justify-content: space-between; align-items: center; position: fixed; top: 0; background: var(--bg); z-index: 10000; border-bottom: 1px solid var(--accent); transform: translateZ(0); }
        .theme-btn { background: none; border: 1px solid var(--text); color: var(--text); padding: 8px 15px; cursor: pointer; font-weight: 900; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; }
        .menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; transform: translateY(-100%) translateZ(0); transition: transform 0.7s cubic-bezier(0.16, 1, 0.3, 1); z-index: 9000; }
        .menu-overlay.active { transform: translateY(0); }
        .menu-overlay a { text-decoration: none; color: var(--text); font-size: 35px; font-weight: 900; letter-spacing: 8px; text-transform: uppercase; margin: 15px 0; }
        .hero { width: 100%; height: 450px; background: url('Banner.jpg') center/cover; margin-top: 80px; transform: translateZ(0); }
        .section { padding: 100px 40px; text-align: center; max-width: 800px; margin: 0 auto; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 650px; margin: 50px auto 0; }
        .nav-btn { padding: 25px; border: 2px solid var(--text); color: var(--text); text-decoration: none; font-weight: 900; font-size: 13px; letter-spacing: 3px; text-transform: uppercase; transform: translateZ(0); transition: 0.3s; }
        .nav-btn:hover { background: var(--text); color: var(--bg); }
        .stripe { width: 30px; height: 2px; background: var(--text); transition: 0.4s; }
    </style>
</head>
<body>
    <nav>
        <div style="font-weight:900; letter-spacing:5px;">BOOT AI</div>
        <div style="display: flex; gap: 20px; align-items: center;">
            <button class="theme-btn" onclick="toggleDarkMode()">THEME</button>
            <div class="hamburger" onclick="toggleMenu()" style="cursor:pointer; display:flex; flex-direction:column; gap:7px;">
                <div class="stripe" id="s1"></div><div class="stripe" id="s2"></div><div class="stripe" id="s3"></div>
            </div>
        </div>
    </nav>
    <div class="menu-overlay" id="navMenu">
        <a href="index.html">HOME</a><a href="projects.html">MANIFEST</a><a href="products.html">PRODUCTS</a><a href="beta.html">BETA</a><a href="social.html">SOCIAL</a>
    </div>
    <div class="hero"></div>
    <section class="section">
        <h2>SNEAK PEEK</h2>
        <p>Explore raw architectural logs and community builds that depart from modern software bloat.</p>
    </section>
    <section class="section" style="background: var(--card); border-top: 1px solid var(--accent);">
        <h2>DIRECTORY</h2>
        <div class="btn-grid">
            <a href="projects.html" class="nav-btn">PROJECTS</a>
            <a href="products.html" class="nav-btn">PRODUCTS</a>
            <a href="beta.html" class="nav-btn" style="border-color: #ffaa00; color: #ffaa00;">BETA HUB</a>
            <a href="social.html" class="nav-btn">SOCIAL</a>
        </div>
    </section>
    <script>
        const html = document.documentElement;
        const setTheme = (t) => { html.setAttribute('data-theme', t); localStorage.setItem('theme', t); };
        if (localStorage.getItem('theme')) setTheme(localStorage.getItem('theme'));
        else if (window.matchMedia('(prefers-color-scheme: dark)').matches) setTheme('dark');
        function toggleDarkMode() { setTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); }
        function toggleMenu() {
            const m = document.getElementById('navMenu'); m.classList.toggle('active');
            const s1=document.getElementById('s1'), s2=document.getElementById('s2'), s3=document.getElementById('s3');
            if(m.classList.contains('active')) { s1.style.transform="rotate(45deg) translate(6px,6px)"; s2.style.opacity="0"; s3.style.transform="rotate(-45deg) translate(6px,-6px)"; }
            else { s1.style.transform="none"; s2.style.opacity="1"; s3.style.transform="none"; }
        }
    </script>
</body>
</html>
