<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOOT AI | Home</title>
    <style>
        :root { --bg: #ffffff; --text: #050505; --line: #e0e0e0; }
        @media (prefers-color-scheme: dark) { :root { --bg: #050505; --text: #d1d1d1; --line: #1a1a1a; } }
        * { box-sizing: border-box; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; }
        
        nav { position: fixed; top: 0; width: 100%; height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 25px; border-bottom: 1px solid var(--line); background: var(--bg); z-index: 1000; }
        .hero { height: 350px; background: url('Banner.jpg') center/cover; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid var(--line); margin-top: 60px; }
        .hero h1 { color: white; letter-spacing: 12px; font-weight: 200; text-shadow: 0 5px 15px rgba(0,0,0,0.5); }

        .section { padding: 80px 30px; text-align: center; max-width: 900px; margin: 0 auto; }
        .quick-info { border-left: 3px solid var(--text); padding-left: 20px; text-align: left; margin: 40px 0; }
        
        .btn-row { display: flex; gap: 15px; justify-content: center; margin-top: 50px; }
        .nav-btn { padding: 18px 35px; border: 1px solid var(--text); text-decoration: none; color: var(--text); font-size: 11px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; }
        .nav-btn:hover { background: var(--text); color: var(--bg); }

        .discord-landing { height: 450px; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('server_room.jpg') center/cover; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
    </style>
</head>
<body>
    <nav>
        <div style="font-weight:900; letter-spacing:3px;">BOOT AI</div>
        <div style="display:flex; gap:20px;">
            <a href="about.html" style="text-decoration:none; color:inherit; font-size:10px; font-weight:bold;">ABOUT</a>
            <a href="projects.html" style="text-decoration:none; color:inherit; font-size:10px; font-weight:bold;">PROJECTS</a>
        </div>
    </nav>

    <div class="hero"><h1>CORE_INIT</h1></div>

    <div class="section">
        <h2>"CODE IS THE ONLY MAGIC LEFT."</h2>
        <div class="quick-info">
            <p><strong>STUDIO:</strong> TECH HAVEN</p>
            <p><strong>LEAD DEVS:</strong> OG & MGKFN</p>
            <p><strong>BUILD PHASE:</strong> 0.1 PRE-ALPHA</p>
        </div>
        <div class="btn-row">
            <a href="projects.html" class="nav-btn">ACCESS DOSSIER</a>
            <a href="products.html" class="nav-btn">SYSTEM STORE</a>
        </div>
    </div>

    <div class="discord-landing">
        <h2 style="letter-spacing:5px;">COMMUNITY_LINK</h2>
        <p style="opacity:0.6; margin-bottom:30px;">Join the architectural discussion.</p>
        <a href="discord.html" class="nav-btn" style="border-color:white; color:white;">SERVER MANIFEST</a>
    </div>
</body>
</html>
