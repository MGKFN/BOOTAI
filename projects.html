<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MANIFEST | BOOT AI</title>
    <style>
        :root { --bg: #fff; --text: #000; --accent: #eee; }
        [data-theme="dark"] { --bg: #0a0a0a; --text: #fff; --accent: #1a1a1a; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; transition: 0.4s; margin: 0; overflow-x: hidden; }
        nav { width: 100%; padding: 30px 50px; display: flex; justify-content: space-between; border-bottom: 1px solid var(--accent); }
        .container { padding: 120px 40px; max-width: 1000px; margin: 0 auto; }
        .proj-card { border: 1px solid var(--text); padding: 40px; margin-bottom: 30px; transform: translateZ(0); will-change: transform; }
        .proj-card h2 { font-size: 32px; letter-spacing: 5px; margin: 0 0 10px; text-transform: uppercase; }
        .proj-card p { font-size: 18px; color: #888; margin-bottom: 30px; }
        .actions { display: flex; gap: 15px; }
        .btn { flex: 1; padding: 18px; text-align: center; border: 1px solid var(--text); text-decoration: none; color: var(--text); font-weight: 900; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; transition: 0.3s; }
        .btn.beta { border-color: #ffaa00; color: #ffaa00; }
        .btn:hover { background: var(--text); color: var(--bg); }
        .btn.beta:hover { background: #ffaa00; color: #000; }
    </style>
</head>
<body>
    <nav><div style="font-weight:900; letter-spacing:5px;">BOOT AI</div><a href="index.html" style="color:var(--text); text-decoration:none; font-size:12px; font-weight:bold;">← RETURN</a></nav>
    <div class="container">
        <div class="proj-card">
            <h2>KS-DOS</h2>
            <p>Hardened Linux distribution designed for sovereign digital environments.</p>
            <div class="actions">
                <a href="ks-dos.html" class="btn">INFO / STABLE</a>
                <a href="beta.html#ksdos-beta" class="btn beta">BETA BUILDS</a>
            </div>
        </div>
        <div class="proj-card">
            <h2>K-DOS</h2>
            <p>Bare-metal x86_64 Assembly architecture with zero dependencies.</p>
            <div class="actions">
                <a href="k-dos.html" class="btn">INFO / STABLE</a>
                <a href="beta.html#kdos-beta" class="btn beta">BETA BUILDS</a>
            </div>
        </div>
    </div>
    <script>
        if (localStorage.getItem('theme')) document.documentElement.setAttribute('data-theme', localStorage.getItem('theme'));
    </script>
</body>
</html>
