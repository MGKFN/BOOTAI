<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SOCIAL | MGKFN</title>
    <style>
        :root { --bg: #fff; --text: #000; --accent: #eee; }
        [data-theme="dark"] { --bg: #0a0a0a; --text: #fff; --accent: #1a1a1a; }
        body { background: var(--bg); color: var(--text); margin: 0; font-family: sans-serif; transition: 0.4s; }
        nav { width: 100%; padding: 30px 50px; display: flex; justify-content: space-between; border-bottom: 1px solid var(--accent); }
        .container { padding: 80px 20px; text-align: center; max-width: 600px; margin: 0 auto; }
        .social-card { border: 2px solid var(--text); padding: 40px; margin-bottom: 20px; text-decoration: none; color: var(--text); display: block; font-weight: 900; transition: 0.3s; transform: translateZ(0); }
        .social-card:hover { background: var(--text); color: var(--bg); }
    </style>
</head>
<body>
    <nav><div style="font-weight:900; letter-spacing:5px;">BOOT AI</div><a href="index.html" style="color:var(--text); text-decoration:none; font-size:12px; font-weight:bold;">← RETURN</a></nav>
    <div class="container">
        <h1>SOCIAL</h1>
        <a href="https://youtube.com/@mgkfn?si=f4Er_LuXCvSEe52T" class="social-card"><h2>YOUTUBE</h2></a>
        <a href="https://discord.gg/t4sgzP8nQ" class="social-card"><h2>DISCORD</h2></a>
    </div>
    <script>
        const html = document.documentElement;
        if (localStorage.getItem('theme')) html.setAttribute('data-theme', localStorage.getItem('theme'));
        else if (window.matchMedia('(prefers-color-scheme: dark)').matches) html.setAttribute('data-theme', 'dark');
    </script>
</body>
</html>
