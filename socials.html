<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOCIAL // BOOT AI</title>
    <style>
        :root { --accent: #00f2ff; --glass: rgba(255, 255, 255, 0.03); --border: rgba(0, 242, 255, 0.2); --bg: #05070a; --text: #fff; }
        [data-theme="light"] { --accent: #0066cc; --glass: rgba(0, 0, 0, 0.03); --border: rgba(0, 102, 204, 0.2); --bg: #f5f5f7; --text: #1d1d1f; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; transition: background 0.3s; }
        .bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at 20% 20%, rgba(0, 242, 255, 0.05) 0%, transparent 40%), radial-gradient(circle at 80% 80%, rgba(147, 51, 234, 0.05) 0%, transparent 40%); }
        [data-theme="light"] .bg-layer { background: radial-gradient(circle at 20% 20%, rgba(0, 102, 204, 0.08) 0%, transparent 40%), radial-gradient(circle at 80% 80%, rgba(147, 51, 234, 0.08) 0%, transparent 40%); }
        .grid-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px); background-size: 40px 40px; opacity: 0.15; }
        nav { padding: 30px 5%; display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); }
        .logo { font-weight: 900; letter-spacing: 2px; color: var(--accent); }
        .back { color: var(--text); text-decoration: none; font-size: 12px; font-weight: bold; opacity: 0.6; transition: 0.3s; }
        .back:hover { opacity: 1; color: var(--accent); }
        .container { padding: 80px 20px; text-align: center; max-width: 600px; margin: 0 auto; }
        h1 { font-size: 3rem; margin-bottom: 50px; letter-spacing: 2px; }
        .social-card { border: 2px solid var(--accent); padding: 40px; margin-bottom: 20px; text-decoration: none; color: var(--text); display: block; font-weight: 900; transition: 0.3s; border-radius: 4px; }
        .social-card:hover { background: var(--accent); color: var(--bg); transform: translateY(-5px); }
        .social-card h2 { font-size: 1.5rem; letter-spacing: 2px; }
        .social-card p { opacity: 0.6; margin-top: 10px; font-size: 0.9rem; font-weight: normal; }
    </style>
</head>
<body>
    <div class="bg-layer"></div><div class="grid-overlay"></div>
    <nav><div class="logo">BOOT AI</div><a href="index.html" class="back">← RETURN</a></nav>
    <div class="container">
        <h1>CONNECT</h1>
        <a href="https://youtube.com/@mgkfn?si=f4Er_LuXCvSEe52T" target="_blank" class="social-card"><h2>YOUTUBE</h2><p>Development videos & tutorials</p></a>
        <a href="https://discord.gg/t4sgzP8nQ" target="_blank" class="social-card"><h2>DISCORD</h2><p>Community & support</p></a>
    </div>
</body>
</html>
